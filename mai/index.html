<!DOCTYPE html><html lang="en"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Opening M.ai</title><meta name="robots" content="noindex,follow"><link rel="canonical" href="https://www.floramaydc.com/"><script data-target="/">
      (function () {
        var currentScript = document.currentScript;
        var target = (currentScript && currentScript.getAttribute('data-target')) || '/';
        try {
          var params = new URLSearchParams(window.location.search || '');
          var prompt = params.get('q') || params.get('prompt') || '';
          var context = params.get('context') || '';
          var payload = {
            source: 'mai_route_handoff',
            forceFullscreen: true,
            prompt: prompt || undefined,
            context: context || undefined,
            autoSend: prompt ? true : false,
          };
          sessionStorage.setItem('mai:pending-open', JSON.stringify(payload));
          sessionStorage.setItem('mai-open', 'true');
        } catch (e) {}
        window.location.replace(target);
      })();
    </script><noscript><meta http-equiv="refresh" content="0;url=/"></noscript><link rel="stylesheet" href="/assets/about.D_gdYDnh.css"></head> <body> <p>Opening M.ai...</p> </body></html>
