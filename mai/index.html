<!DOCTYPE html><html lang="en"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M.ai — Ask Flora's site anything</title><meta name="description" content="M.ai is a conversational guide to Flora May dela Cruz's work, writing, play, tools, and ideas. Ask anything and it searches across the site and synthesizes an answer with citations."><meta name="robots" content="index,follow"><link rel="canonical" href="https://floramaydc.com/mai/"><script data-target="/">
      (function () {
        var currentScript = document.currentScript;
        var target = (currentScript && currentScript.getAttribute('data-target')) || '/';
        try {
          var params = new URLSearchParams(window.location.search || '');
          var prompt = params.get('q') || params.get('prompt') || '';
          var context = params.get('context') || '';
          var payload = {
            source: 'mai_route_handoff',
            forceFullscreen: true,
            prompt: prompt || undefined,
            context: context || undefined,
            autoSend: prompt ? true : false,
          };
          sessionStorage.setItem('mai:pending-open', JSON.stringify(payload));
          sessionStorage.setItem('mai-open', 'true');
        } catch (e) {}
        window.location.replace(target);
      })();
