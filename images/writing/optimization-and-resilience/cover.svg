<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-label="A clean, efficient straight path that breaks partway across, beside a winding path that detours around obstacles but keeps moving forward to the edge.">
  <rect width="1600" height="1200" fill="#e5e3dc"/>

  <!-- Shared origin -->
  <circle cx="220" cy="840" r="20" fill="#303636"/>
  <text x="220" y="900" text-anchor="middle" font-family="Almarai, system-ui, sans-serif" font-size="24" fill="#5a6362">Start</text>

  <!-- Uncertainty: obstacles the resilient path moves around -->
  <g fill="none" stroke="#6b7373" stroke-width="3" stroke-dasharray="9 9">
    <rect x="560" y="470" width="150" height="150" rx="14"/>
    <rect x="1010" y="600" width="160" height="160" rx="14"/>
  </g>
  <g font-family="Almarai, system-ui, sans-serif" font-size="20" fill="#6b7373">
    <text x="635" y="552" text-anchor="middle">change</text>
    <text x="1090" y="688" text-anchor="middle">setback</text>
  </g>

  <!-- Optimization: the planned, efficient line that stops cooperating -->
  <g>
    <line x1="240" y1="828" x2="900" y2="360" stroke="#495a58" stroke-width="9" stroke-linecap="round" stroke-dasharray="2 22"/>
    <g fill="#495a58">
      <circle cx="240" cy="828" r="11"/>
      <circle cx="405" cy="711" r="11"/>
      <circle cx="570" cy="594" r="11"/>
      <circle cx="735" cy="477" r="11"/>
      <circle cx="900" cy="360" r="11"/>
    </g>
    <!-- abrupt break -->
    <path d="M900 360 l40 -20 l-12 34 l40 -10" fill="none" stroke="#495a58" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
    <text x="640" y="330" text-anchor="middle" font-family="Almarai, system-ui, sans-serif" font-size="30" fill="#495a58">Optimization</text>
    <text x="640" y="366" text-anchor="middle" font-family="Almarai, system-ui, sans-serif" font-size="21" fill="#5a6362">efficient until life stops cooperating</text>
  </g>

  <!-- Resilience: the winding path that detours but continues -->
  <g>
    <path d="M240 852
             C 360 1000, 470 980, 520 870
             C 575 748, 690 720, 730 640
             C 770 560, 690 470, 760 430
             C 850 380, 940 470, 980 560
             C 1018 648, 940 740, 1010 800
             C 1085 864, 1210 800, 1270 700
             C 1330 600, 1380 580, 1470 580"
          fill="none" stroke="#a24a2a" stroke-width="11" stroke-linecap="round"/>
    <polygon points="1490,580 1448,558 1448,602" fill="#a24a2a"/>
    <text x="1230" y="528" text-anchor="middle" font-family="Almarai, system-ui, sans-serif" font-size="30" fill="#a24a2a">Resilience</text>
    <text x="1230" y="990" text-anchor="middle" font-family="Almarai, system-ui, sans-serif" font-size="21" fill="#5a6362">detours, but keeps moving forward</text>
  </g>

  <text x="800" y="1110" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="40" fill="#303636">continue through futures we never expected</text>
</svg>
