<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-label="Layered Markdown pages carrying design decisions, behavior rules, and quality checks into a coded prototype">
  <rect width="1600" height="1200" fill="#e5e3dc"/>

  <g font-family="Almarai, system-ui, sans-serif">
    <rect x="180" y="180" width="1240" height="820" rx="28" fill="#ffffff" stroke="#303636" stroke-width="5"/>
    <rect x="230" y="240" width="1140" height="88" rx="16" fill="#2a3432"/>
    <circle cx="285" cy="284" r="12" fill="#e0a890"/>
    <circle cx="328" cy="284" r="12" fill="#8aa39e"/>
    <circle cx="371" cy="284" r="12" fill="#e5e3dc"/>
    <text x="800" y="298" text-anchor="middle" font-size="28" fill="#e8e3d7">design-memory.md</text>

    <g transform="translate(270 390)">
      <rect x="0" y="0" width="390" height="500" rx="18" fill="#f6f3ec" stroke="#495a58" stroke-width="4"/>
      <text x="36" y="70" font-size="26" font-family="Libre Baskerville, Georgia, serif" fill="#303636">## Decisions</text>
      <line x1="36" y1="120" x2="320" y2="120" stroke="#5a6362" stroke-width="7" stroke-linecap="round"/>
      <line x1="36" y1="165" x2="280" y2="165" stroke="#5a6362" stroke-width="7" stroke-linecap="round"/>
      <line x1="36" y1="210" x2="330" y2="210" stroke="#5a6362" stroke-width="7" stroke-linecap="round"/>
      <rect x="36" y="275" width="260" height="54" rx="27" fill="#495a58"/>
      <text x="166" y="310" text-anchor="middle" font-size="22" fill="#ffffff">survives navigation</text>
      <path d="M58 400 L116 454 L238 350" fill="none" stroke="#a24a2a" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(610 325)">
      <rect x="0" y="0" width="390" height="500" rx="18" fill="#ffffff" stroke="#303636" stroke-width="5"/>
      <text x="36" y="70" font-size="26" font-family="Libre Baskerville, Georgia, serif" fill="#303636">## Behavior</text>
      <rect x="36" y="112" width="318" height="70" rx="12" fill="#e5e3dc"/>
      <text x="62" y="155" font-size="22" fill="#303636">persist filters</text>
      <rect x="36" y="210" width="318" height="70" rx="12" fill="#e5e3dc"/>
      <text x="62" y="253" font-size="22" fill="#303636">clear dialogs</text>
      <rect x="36" y="308" width="318" height="70" rx="12" fill="#e5e3dc"/>
      <text x="62" y="351" font-size="22" fill="#303636">restore focus deliberately</text>
      <path d="M330 430 C410 390, 470 390, 540 430" fill="none" stroke="#a24a2a" stroke-width="9" stroke-linecap="round"/>
      <polygon points="542,430 505,410 505,450" fill="#a24a2a"/>
    </g>

    <g transform="translate(940 390)">
      <rect x="0" y="0" width="390" height="500" rx="18" fill="#2a3432" stroke="#303636" stroke-width="4"/>
      <text x="36" y="70" font-size="26" font-family="Libre Baskerville, Georgia, serif" fill="#e8e3d7">## Checks</text>
      <text x="36" y="133" font-size="24" fill="#bcc0bb">1. Semantics</text>
      <text x="36" y="185" font-size="24" fill="#bcc0bb">2. Name and role</text>
      <text x="36" y="237" font-size="24" fill="#bcc0bb">3. Focus and keyboard</text>
      <text x="36" y="289" font-size="24" fill="#bcc0bb">4. State and updates</text>
      <text x="36" y="341" font-size="24" fill="#bcc0bb">5. Reading and reach</text>
      <rect x="36" y="400" width="255" height="56" rx="28" fill="#8aa39e"/>
      <text x="164" y="436" text-anchor="middle" font-size="22" fill="#1c2422">review before ship</text>
    </g>
  </g>

  <g font-family="Libre Baskerville, Georgia, serif" fill="#303636">
    <text x="800" y="1080" text-anchor="middle" font-size="42">the thinking travels with the work</text>
  </g>
</svg>
