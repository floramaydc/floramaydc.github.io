<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 740" role="img" aria-label="A wooden toy chest, lid propped wide open, glowing warmly inside, with colourful building blocks, a red ball, a star, and a small toy car tumbling out.">
  <defs>
    <!-- Interior warm light -->
    <radialGradient id="ig" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#fde4c4"/>
      <stop offset="100%" stop-color="#d9a86c"/>
    </radialGradient>
    <!-- Light spilling UP from the opening -->
    <radialGradient id="spill" cx="50%" cy="100%" r="85%">
      <stop offset="0%"  stop-color="#fdd4a0" stop-opacity="0.40"/>
      <stop offset="55%" stop-color="#fdd4a0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fdd4a0" stop-opacity="0"/>
    </radialGradient>
    <!-- Lid inner surface (warm pale wood, in shadow compared to exterior) -->
    <linearGradient id="li" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#edd5a0"/>
      <stop offset="100%" stop-color="#c9a068"/>
    </linearGradient>
    <!-- Chest front face -->
    <linearGradient id="bf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#cf8856"/>
      <stop offset="100%" stop-color="#a85e30"/>
    </linearGradient>
    <!-- Soft drop shadow -->
    <filter id="sh" x="-22%" y="-12%" width="144%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#2a1808" flood-opacity="0.17"/>
    </filter>
    <filter id="shSm" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#2a1808" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ── Light spilling upward from the open chest ── -->
  <!-- sits behind everything so the chest body blocks the bottom half of it -->
  <ellipse cx="410" cy="445" rx="295" ry="205" fill="url(#spill)"/>

  <!-- ── Ground shadow ── -->
  <ellipse cx="410" cy="662" rx="238" ry="20" fill="#7a4820" opacity="0.13"/>

  <!-- ══════════════════════════════════════════════════════════
       CHEST BODY
  ═══════════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <!-- Left side face -->
    <polygon points="154,464 118,440 118,616 154,628" fill="#985028"/>
    <!-- Right side face -->
    <polygon points="666,464 702,440 702,616 666,628" fill="#985028"/>
    <!-- Front face -->
    <rect x="154" y="464" width="512" height="164" rx="6" fill="url(#bf)"/>
    <!-- Top rim strip (between interior and front face) -->
    <rect x="118" y="444" width="584" height="22" rx="3" fill="#b87040"/>
    <!-- Bottom strip -->
    <rect x="118" y="626" width="584" height="14" rx="3" fill="#884020"/>

    <!-- Wood grain on front face -->
    <g stroke="#a86838" stroke-width="1.1" opacity="0.27" fill="none">
      <line x1="205" y1="470" x2="205" y2="624"/>
      <line x1="282" y1="468" x2="282" y2="626"/>
      <line x1="370" y1="466" x2="370" y2="628"/>
      <line x1="450" y1="466" x2="450" y2="628"/>
      <line x1="535" y1="468" x2="535" y2="626"/>
      <line x1="610" y1="470" x2="610" y2="624"/>
    </g>

    <!-- Decorative lower panel band -->
    <rect x="154" y="566" width="512" height="42" fill="#985030" opacity="0.40"/>
    <line x1="154" y1="566" x2="666" y2="566" stroke="#7a3c18" stroke-width="1.1" opacity="0.36"/>
    <line x1="154" y1="608" x2="666" y2="608" stroke="#7a3c18" stroke-width="1.1" opacity="0.36"/>

    <!-- Corner brackets (front face) -->
    <g fill="#d4a060" stroke="#a87020" stroke-width="1.5">
      <rect x="154" y="446" width="26" height="26" rx="3"/>
      <rect x="640" y="446" width="26" height="26" rx="3"/>
      <rect x="154" y="604" width="26" height="26" rx="3"/>
      <rect x="640" y="604" width="26" height="26" rx="3"/>
    </g>

    <!-- Chest latch (front centre) -->
    <rect x="384" y="510" width="52" height="34" rx="6" fill="#d4a060" stroke="#9a7030" stroke-width="1.5"/>
    <rect x="393" y="518" width="34" height="20" rx="4" fill="#b08030" stroke="#9a6820" stroke-width="1"/>
    <circle cx="410" cy="526" r="4.5" fill="#7a5020"/>
    <rect x="407" y="526" width="6" height="7" rx="2" fill="#7a5020"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════
       INTERIOR — warm cavity visible at the top of the chest
  ═══════════════════════════════════════════════════════════ -->
  <rect x="122" y="420" width="576" height="28" fill="url(#ig)" rx="1"/>
  <!-- Interior back wall depth shadow -->
  <rect x="122" y="420" width="576" height="14" fill="#b88840" opacity="0.42"/>
  <!-- Toys peeking inside -->
  <rect x="212" y="422" width="38" height="22" rx="4" fill="#e05030" stroke="#b83018" stroke-width="1.2"/>
  <text x="231" y="435" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">A</text>
  <rect x="254" y="426" width="30" height="18" rx="4" fill="#4880c8" stroke="#3060a0" stroke-width="1.2"/>
  <circle cx="415" cy="431" r="18" fill="#e04040" stroke="#b02828" stroke-width="1.2"/>
  <ellipse cx="406" cy="422" rx="7" ry="5" fill="#f08080" opacity="0.52"/>
  <polygon points="505,428 509,440 522,440 513,447 516,459 505,452 494,459 497,447 488,440 501,440" fill="#f0b030" stroke="#c08010" stroke-width="1.1"/>

  <!-- Hinges (lid attachment points) -->
  <g fill="#c09040" stroke="#9a7020" stroke-width="1.2">
    <rect x="226" y="438" width="24" height="13" rx="3"/>
    <rect x="570" y="438" width="24" height="13" rx="3"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════
       LID — drawn directly in its open position.
       Inner surface faces the viewer.
       Bottom edge (hinge) at y=456; free edge at y=186.
       Bottom is wider (154→666) than top (200→620) — perspective foreshortening.
  ═══════════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <!-- Main inner surface — parallelogram -->
    <path d="M154,456 L666,456 L620,186 L200,186 Z" fill="url(#li)"/>

    <!-- Horizontal wood grain on inner face (follows perspective) -->
    <g stroke="#c0a068" stroke-width="1.0" opacity="0.27" fill="none">
      <!-- y=224 --> <line x1="196" y1="224" x2="624" y2="224"/>
      <!-- y=264 --> <line x1="188" y1="264" x2="632" y2="264"/>
      <!-- y=304 --> <line x1="180" y1="304" x2="640" y2="304"/>
      <!-- y=344 --> <line x1="172" y1="344" x2="648" y2="344"/>
      <!-- y=384 --> <line x1="163" y1="384" x2="657" y2="384"/>
      <!-- y=424 --> <line x1="157" y1="424" x2="663" y2="424"/>
    </g>

    <!-- Decorative inset panel on lid interior -->
    <path d="M256,238 L564,238 L568,376 L252,376 Z" fill="#d8b070" opacity="0.35" stroke="#b89050" stroke-width="1"/>
    <!-- Star emblem on lid -->
    <polygon points="410,264 417,287 442,287 422,303 429,326 410,311 391,326 398,303 378,287 403,287"
      fill="#f0c030" stroke="#c09010" stroke-width="1.5"/>

    <!-- Lid outer (free) edge — shows the lid thickness at the top -->
    <rect x="200" y="178" width="420" height="11" rx="2" fill="#c07838"/>
    <!-- Lid left side thickness sliver -->
    <polygon points="154,456 178,456 200,186 176,186" fill="#9a5428" opacity="0.50"/>
    <!-- Lid right side thickness sliver -->
    <polygon points="666,456 642,456 620,186 644,186" fill="#9a5428" opacity="0.50"/>

    <!-- Lid corner brackets -->
    <g fill="#d4a060" stroke="#a87020" stroke-width="1.5">
      <rect x="200" y="178" width="24" height="24" rx="3"/>
      <rect x="596" y="178" width="24" height="24" rx="3"/>
      <rect x="154" y="438" width="24" height="24" rx="3"/>
      <rect x="642" y="438" width="24" height="24" rx="3"/>
    </g>
  </g>

  <!-- ══════════════════════════════════════════════════════════
       TOYS SCATTERED FREELY AROUND THE CHEST
  ═══════════════════════════════════════════════════════════ -->

  <!-- Red ball — rolled far right, on the ground -->
  <g filter="url(#shSm)">
    <ellipse cx="728" cy="644" rx="30" ry="9" fill="#7a4820" opacity="0.12"/>
    <circle cx="728" cy="592" r="46" fill="#e03838" stroke="#b02020" stroke-width="2.5"/>
    <ellipse cx="712" cy="573" rx="16" ry="10" fill="#f08888" opacity="0.46"/>
    <path d="M728,546 Q766,592 728,638" fill="none" stroke="#b02020" stroke-width="1.8" opacity="0.38"/>
    <path d="M728,546 Q690,592 728,638" fill="none" stroke="#b02020" stroke-width="1.8" opacity="0.38"/>
  </g>

  <!-- Blue block — tumbled out left, on the ground -->
  <g filter="url(#shSm)">
    <ellipse cx="76" cy="642" rx="38" ry="10" fill="#7a4820" opacity="0.10"/>
    <g transform="rotate(-17, 76, 596)">
      <rect x="40" y="560" width="72" height="72" rx="8" fill="#4880c8" stroke="#3060a0" stroke-width="2.5"/>
      <text x="76" y="598" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">B</text>
    </g>
  </g>

  <!-- Yellow star — launched upper-right, above the lid -->
  <g filter="url(#shSm)" transform="rotate(22, 742, 106)">
    <polygon points="742,58 751,87 782,87 758,104 768,134 742,116 716,134 726,104 702,87 733,87"
      fill="#f0c030" stroke="#c09010" stroke-width="2.5"/>
  </g>

  <!-- Green block — mid-air upper left, above the lid -->
  <g filter="url(#shSm)" transform="rotate(-26, 96, 298)">
    <rect x="60" y="262" width="72" height="72" rx="8" fill="#50a850" stroke="#388038" stroke-width="2.5"/>
    <text x="96" y="300" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">G</text>
  </g>

  <!-- Orange triangle block — mid-air, right of chest -->
  <g filter="url(#shSm)" transform="rotate(-14, 716, 312)">
    <polygon points="716,266 754,338 678,338" fill="#e87830" stroke="#c05818" stroke-width="2"/>
  </g>

  <!-- Small wooden car — lower right, on the ground -->
  <g transform="translate(540, 616) rotate(-3)" filter="url(#shSm)">
    <ellipse cx="56" cy="80" rx="58" ry="9" fill="#7a4820" opacity="0.10"/>
    <rect x="0" y="20" width="112" height="40" rx="8" fill="#d04828" stroke="#a03018" stroke-width="2"/>
    <rect x="18" y="4" width="56" height="28" rx="6" fill="#e06040" stroke="#b04020" stroke-width="2"/>
    <rect x="24" y="9" width="42" height="18" rx="4" fill="#a8d8f0" stroke="#80b8d0" stroke-width="1.2"/>
    <circle cx="26" cy="64" r="16" fill="#3a3a3a" stroke="#222" stroke-width="1.8"/>
    <circle cx="86" cy="64" r="16" fill="#3a3a3a" stroke="#222" stroke-width="1.8"/>
    <circle cx="26" cy="64" r="6" fill="#888"/>
    <circle cx="86" cy="64" r="6" fill="#888"/>
  </g>

  <!-- Letter tile C — bottom-left corner -->
  <g filter="url(#shSm)" transform="rotate(24, 68, 628)">
    <rect x="42" y="602" width="52" height="52" rx="6" fill="#f0e8d0" stroke="#c0a870" stroke-width="2"/>
    <text x="68" y="630" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#8a5c30" text-anchor="middle" dominant-baseline="middle">C</text>
  </g>

</svg>
