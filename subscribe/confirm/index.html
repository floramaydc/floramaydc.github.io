<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Confirming your subscription — floramaydc.com</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           background: #e5e3dc; color: #303636;
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
           padding: 24px; }
    .card { max-width: 460px; background: #fff; border-radius: 14px; padding: 36px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h1 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0 0 4px; font-size: 15px; line-height: 1.6; color: #5a6362; }
    a.cta { display: inline-block; margin-top: 20px; padding: 11px 20px; background: #303636;
            color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1c2422; color: #e8e3d7; }
      .card { background: #2a3432; box-shadow: none; }
      p { color: #bcc0bb; }
      a.cta { background: #e8e3d7; color: #1c2422; }
    }
  </style>
</head>
<body>
  <main class="card" id="card">
    <p>Confirming…</p>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token  = params.get('token');
      var status = params.get('status');
      var card   = document.getElementById('card');

      if (token) {
        location.replace(
          'https://mai.floramaydc-mai.workers.dev/subscribe/confirm?token=' +
          encodeURIComponent(token)
        );
        return;
      }

      if (status === 'confirmed') {
        document.title = "You're subscribed — floramaydc.com";
        card.innerHTML =
          '<h1>You\'re subscribed</h1>' +
          '<p>Thanks for confirming. You\'ll get the occasional note when there\'s a new playbook or tool worth your time.</p>' +
          '<a class="cta" href="/">Back to the site</a>';
      } else if (status === 'expired') {
        document.title = 'Link expired — floramaydc.com';
        card.innerHTML =
          '<h1>This link has expired</h1>' +
          '<p>Confirmation links are good for 7 days. Subscribe again from the site to get a fresh one.</p>' +
          '<a class="cta" href="/">Back to the site</a>';
      } else if (status === 'error') {
        document.title = 'Something went wrong — floramaydc.com';
        card.innerHTML =
          '<h1>Something went wrong</h1>' +
          '<p>Try again in a moment, or <a href="/contact">get in touch</a> if it keeps happening.</p>' +
          '<a class="cta" href="/">Back to the site</a>';
      } else {
        location.replace('/');
      }
    })();
  </script>
</body>
</html>
