<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Unsubscribing… — floramaydc.com</title>
  <meta name="robots" content="noindex,nofollow">
  <script>
    (function () {
      var token = new URLSearchParams(location.search).get('token');
      if (token) {
        location.replace(
          'https://mai.floramaydc-mai.workers.dev/unsubscribe?token=' +
          encodeURIComponent(token)
        );
      } else {
        location.replace('/');
      }
    })();
  </script>
</head>

</html>
